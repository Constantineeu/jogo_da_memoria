<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;
  text-align:center;
  background:#000;
}

/* SCREENS */
.screen{
  display:none;
  min-height:100vh;
  width:100%;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background-size:cover;
  background-position:center;
}
.active{display:flex}

/* INTRO */
#intro{ background:url("img/tela_roxa.jpg") center/cover no-repeat; }
#trophy{
  width:200px;
  animation:spin 3s linear infinite;
}
@keyframes spin{
  0%{transform:rotateY(0deg)}
  100%{transform:rotateY(360deg)}
}

/* MENU */
#menu{ background:url("img/fundo_menu.jpg") center/cover no-repeat; }
.menuButtons{ display:flex; gap:16px; margin:16px; }
button{
  padding:12px 22px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e90ff;
  color:#fff;
}
button:hover{ filter:brightness(1.1) }
.circleBtn{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:20px;
}

/* REGRAS */
#rules{ background:#9be79b; color:#000; position:relative; }
.rulesBox{
  background:#0a5f0a;
  color:#fff;
  padding:26px;
  border-radius:12px;
  max-width:600px;
}
.back{
  position:absolute; top:18px; left:18px;
  font-size:28px; cursor:pointer; user-select:none;
}

/* DIFICULDADE */
#difficulty{ background:#0f172a; }

/* GAME */
#game{ background:#0b1020; position:relative; }
#hud{
  position:absolute; top:10px; left:0; right:0;
  display:flex; justify-content:space-between;
  padding:0 20px; font-weight:bold;
}
#board{
  margin-top:70px;
  display:grid;
  grid-template-columns:repeat(4,160px);
  grid-auto-rows:190px;
  gap:12px;
  justify-content:center;
}
.card{
  width:160px;height:190px;
  background:#1e90ff;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.card.open img{ display:block }

/* RANK */
table{
  background:#fff;
  color:#000;
  border-collapse:collapse;
  margin-top:14px;
}
td,th{ border:1px solid #000; padding:6px 10px; }
.playerRow{ background:#ddd; font-weight:bold; }
</style>
</head>

<body>

<audio id="music" loop>
  <source src="music/stadium.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div id="intro" class="screen active">
  <img id="trophy" src="img/trofeu.png">
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <h1>Memory of the Champions</h1>
  <div class="menuButtons">
    <button onclick="start()">Jogar</button>
    <button class="circleBtn" onclick="trocarTela('rules')">?</button>
  </div>

  <h2>Ranking</h2>
  <table id="rankTable">
    <tr>
      <th>Jogador</th>
      <th>Dificuldade</th>
      <th>Pontos</th>
      <th>Tempo</th>
      <th>Data</th>
    </tr>
  </table>
</div>

<!-- REGRAS -->
<div id="rules" class="screen">
  <div class="back" onclick="trocarTela('menu')">⬅</div>
  <div class="rulesBox">
    <h2>Regras</h2>
    <p>Encontre os pares de jogadores.</p>
    <p>Cada par vale <b>10 pontos</b>.</p>
    <p>O tempo depende da dificuldade.</p>
    <p>Mesmo se o tempo acabar sua pontuação será salva.</p>
  </div>
</div>

<!-- DIFICULDADE -->
<div id="difficulty" class="screen">
  <div class="back" onclick="trocarTela('menu')">⬅</div>
  <h2>Dificuldade</h2>
  <button onclick="startGame(120,'Fácil')">Fácil</button>
  <button onclick="startGame(90,'Médio')">Médio</button>
  <button onclick="startGame(60,'Normal')">Normal</button>
  <button onclick="startGame(40,'Difícil')">Difícil</button>
  <button onclick="startGame(20,'Extremo')">Extremo</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <h2 id="player"></h2>
  <div id="hud">
    <div id="points">Pontos: 0</div>
    <div id="timer">Tempo: 0</div>
  </div>
  <div id="board"></div>
</div>

<script>

setTimeout(()=>trocarTela("menu"),3000)

/* VARIÁVEIS */
let nome=""
let pontos=0
let dificuldadeAtual=""
let tempoInicial=0
let tempoFinal=0
let timerInterval=null
let jogoAtivo=false

const jogadores=[
"messi","mbappe","neymar","modric",
"griezmann","alvarez","vinijr","kane"
]

let cartas=[]
let primeira=null
let segunda=null
let trava=false

/* TELAS */
function trocarTela(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

/* MENU */
function start(){
  nome=prompt("Digite seu nome")
  if(!nome) return
  document.getElementById("player").innerText="Jogador: "+nome
  trocarTela("difficulty")
}

/* INICIAR JOGO */
function startGame(segundos,dif){

  pontos=0
  dificuldadeAtual=dif
  jogoAtivo=true

  primeira=null
  segunda=null
  trava=false

  tempoInicial=Date.now()
  tempoFinal=Date.now()+segundos*1000

  document.getElementById("points").innerText="Pontos: 0"

  trocarTela("game")

  document.getElementById("music").play()

  criarTabuleiro()

  if(timerInterval) clearInterval(timerInterval)
  timerInterval=setInterval(atualizarTempo,500)

}

/* TIMER */
function atualizarTempo(){

  if(!jogoAtivo) return

  let restante=Math.floor((tempoFinal-Date.now())/1000)
  if(restante<0) restante=0

  document.getElementById("timer").innerText="Tempo: "+restante

  if(restante<=0){
    encerrar(false)
  }

}

/* TABULEIRO */
function criarTabuleiro(){

  cartas=[...jogadores,...jogadores]
  cartas.sort(()=>Math.random()-0.5)

  const board=document.getElementById("board")
  board.innerHTML=""

  cartas.forEach(j=>{

    let card=document.createElement("div")
    card.className="card"
    card.dataset.valor=j

    let img=document.createElement("img")
    img.src="img/"+j+".jpg"

    card.appendChild(img)

    card.onclick=()=>virar(card)

    board.appendChild(card)

  })

}

/* VIRAR CARTA */
function virar(card){

  if(!jogoAtivo) return
  if(trava) return
  if(card.classList.contains("open")) return

  card.classList.add("open")

  if(!primeira){
    primeira=card
    return
  }

  segunda=card
  trava=true

  if(primeira.dataset.valor===segunda.dataset.valor){

    pontos+=10
    document.getElementById("points").innerText="Pontos: "+pontos

    primeira=null
    segunda=null
    trava=false

    verificar()

  }else{

    setTimeout(()=>{
      primeira.classList.remove("open")
      segunda.classList.remove("open")
      primeira=null
      segunda=null
      trava=false
    },700)

  }

}

/* VERIFICAR VITÓRIA */
function verificar(){

  let abertas=document.querySelectorAll(".card.open")

  if(abertas.length===cartas.length){
    encerrar(true)
  }

}

/* FINALIZAR */
function encerrar(vitoria){

  if(!jogoAtivo) return

  jogoAtivo=false

  clearInterval(timerInterval)

  const music=document.getElementById("music")
  music.pause()
  music.currentTime=0

  let tempoUsado=Math.floor((Date.now()-tempoInicial)/1000)

  salvarRank(nome,pontos,tempoUsado)

  setTimeout(()=>{
    if(vitoria){
      alert("Você venceu! Pontos: "+pontos)
    }else{
      alert("Game Over! Pontos: "+pontos)
    }
    trocarTela("menu")
  },200)

}

/* SALVAR RANK (ATUALIZA SE FOR MAIOR) */
function salvarRank(nome,pontos,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let jogador=rank.find(j=>j.nome===nome)

if(!jogador){
  jogador={nome:nome,jogos:[]}
  rank.push(jogador)
}

let jogoExistente=jogador.jogos.find(g=>g.dificuldade===dificuldadeAtual)

if(!jogoExistente){

  jogador.jogos.push({
    dificuldade:dificuldadeAtual,
    pontos:pontos,
    tempo:tempo,
    data:new Date().toLocaleDateString()
  })

}else{

  if(pontos>jogoExistente.pontos){
    jogoExistente.pontos=pontos
    jogoExistente.tempo=tempo
    jogoExistente.data=new Date().toLocaleDateString()
  }

}

localStorage.setItem("rank",JSON.stringify(rank))

carregarRank()

}

/* CARREGAR RANK */
function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

tabela.innerHTML=`
<tr>
<th>Jogador</th>
<th>Dificuldade</th>
<th>Pontos</th>
<th>Tempo</th>
<th>Data</th>
</tr>
`

rank.forEach(j=>{

let linha=document.createElement("tr")
linha.className="playerRow"
linha.innerHTML=`<td colspan="5">${j.nome}</td>`
tabela.appendChild(linha)

j.jogos.forEach(g=>{

let l=document.createElement("tr")

l.innerHTML=`
<td></td>
<td>${g.dificuldade}</td>
<td>${g.pontos}</td>
<td>${g.tempo}s</td>
<td>${g.data}</td>
`

tabela.appendChild(l)

})

})

}

carregarRank()

</script>
</body>
</html>
