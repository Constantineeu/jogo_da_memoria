<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória - Copa</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b5fa5;
color:white;
text-align:center;
}

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:8px;
background:#1e90ff;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(11,80px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.card{
width:80px;
height:100px;
background:#1e90ff;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.card img{
width:100%;
height:100%;
display:none;
border-radius:8px;
}

.card.open img{
display:block;
}

#timer{
font-size:24px;
margin:10px;
}

#countdown{
position:absolute;
font-size:80px;
display:none;
}

table{
background:white;
color:black;
border-collapse:collapse;
}

td,th{
padding:6px 10px;
border:1px solid black;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music/stadium.mp3" type="audio/mpeg">
</audio>

<!-- MENU -->

<div id="menu" class="screen active">

<h1>JOGO DA MEMÓRIA</h1>
<h3>Especial Copa do Mundo</h3>

<button onclick="start()">👤 Jogar</button>

<h2>Ranking</h2>

<table id="rankTable">
<tr>
<th>#</th>
<th>Nome</th>
<th>Tempo</th>
<th>Data</th>
</tr>
</table>

</div>

<!-- DIFICULDADE -->

<div id="difficulty" class="screen">

<h2>Escolha a dificuldade</h2>

<button onclick="countdown(120)">Fácil (2 min)</button>
<button onclick="countdown(90)">Médio (1:30)</button>
<button onclick="countdown(60)">Normal (1 min)</button>
<button onclick="countdown(40)">Difícil (40s)</button>
<button onclick="countdown(20)">Extremo (20s)</button>

</div>

<!-- JOGO -->

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="timer"></div>

<div id="board"></div>

</div>

<div id="countdown"></div>

<script>

let nome="";
let tempoInicial;
let tempo;
let intervalo;

const jogadores=[
"messi","mbappe","neymar","modric","griezmann",
"alvarez","vinijr","kane","debruyne","hakimi","giroud"
];

let cartas=[];
let primeira=null;
let segunda=null;
let trava=false;

function trocarTela(id){
document.querySelectorAll(".screen")
.forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function start(){

nome=prompt("Digite seu nome");

if(!nome)return;

document.getElementById("player").innerText="Jogador: "+nome;

trocarTela("difficulty");

}

function countdown(t){

tempoInicial=t;
tempo=t;

trocarTela("game");

let c=3;

let el=document.getElementById("countdown");

el.style.display="block";
el.innerText=c;

let cont=setInterval(()=>{

c--;

if(c==0){

clearInterval(cont);
el.style.display="none";

document.getElementById("music").play();

iniciarJogo();

}else{

el.innerText=c;

}

},1000);

}

function iniciarJogo(){

cartas=[...jogadores,...jogadores];

cartas.sort(()=>Math.random()-0.5);

const tab=document.getElementById("board");

tab.innerHTML="";

cartas.forEach(j=>{

let card=document.createElement("div");
card.className="card";
card.dataset.valor=j;

let img=document.createElement("img");
img.src="img/"+j+".jpg";

card.appendChild(img);

card.onclick=()=>virar(card);

tab.appendChild(card);

});

intervalo=setInterval(()=>{

tempo--;

document.getElementById("timer").innerText="Tempo: "+tempo+"s";

if(tempo<=0){

clearInterval(intervalo);
document.getElementById("music").pause();

alert("Game Over");

location.reload();

}

},1000);

}

function virar(card){

if(trava)return;
if(card.classList.contains("open"))return;

card.classList.add("open");

if(!primeira){
primeira=card;
return;
}

segunda=card;
trava=true;

if(primeira.dataset.valor==segunda.dataset.valor){

primeira=null;
segunda=null;
trava=false;

verificar();

}else{

setTimeout(()=>{

primeira.classList.remove("open");
segunda.classList.remove("open");

primeira=null;
segunda=null;
trava=false;

},800);

}

}

function verificar(){

let abertas=document.querySelectorAll(".open");

if(abertas.length==cartas.length){

clearInterval(intervalo);

document.getElementById("music").pause();

let tempoUsado=tempoInicial-tempo;

salvarRank(nome,tempoUsado);

alert("Você venceu em "+tempoUsado+" segundos!");

location.reload();

}

}

function salvarRank(nome,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[];

let jogador=rank.find(r=>r.nome===nome);

let data=new Date().toLocaleDateString();

if(jogador){

if(tempo<jogador.tempo){
jogador.tempo=tempo;
jogador.data=data;
}

}else{

rank.push({nome,tempo,data});

}

rank.sort((a,b)=>a.tempo-b.tempo);

rank=rank.slice(0,50);

localStorage.setItem("rank",JSON.stringify(rank));

}

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[];

let tabela=document.getElementById("rankTable");

rank.forEach((r,i)=>{

let linha=document.createElement("tr");

linha.innerHTML=`
<td>${i+1}</td>
<td>${r.nome}</td>
<td>${r.tempo}s</td>
<td>${r.data}</td>
`;

tabela.appendChild(linha);

});

}

carregarRank();

</script>

</body>
</html>
