<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
background-size:cover;
background-position:center;
}

.active{display:flex}

/* INTRO */

#intro{
background:url("img/tela_roxa.jpg") center/cover no-repeat;
}

#trophy{
width:200px;
animation:spin 3s linear;
}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* MENU */

#menu{
background:url("img/fundo_menu.jpg") center/cover no-repeat;
}

.menuButtons{
display:flex;
gap:20px;
margin:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.circleBtn{
width:50px;
height:50px;
border-radius:50%;
}

/* REGRAS */

#rules{
background:#9be79b;
color:black;
}

.rulesBox{
background:#0a5f0a;
color:white;
padding:30px;
border-radius:10px;
max-width:600px;
}

.back{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

/* HUD */

#game{
position:relative;
}

#timer{
position:absolute;
top:10px;
right:20px;
background:#00000088;
padding:8px 15px;
border-radius:8px;
}

#points{
position:absolute;
top:10px;
left:20px;
background:#00000088;
padding:8px 15px;
border-radius:8px;
}

/* BOARD */

#board{
display:grid;
grid-template-columns:repeat(4,140px);
gap:12px;
margin-top:80px;
}

.card{
width:140px;
height:170px;
background:#1e90ff;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.card img{
width:100%;
height:100%;
border-radius:10px;
display:none;
}

.card.open img{
display:block;
}

.card.disabled{
cursor:not-allowed;
opacity:0.5;
pointer-events:none;
}

/* RANK */

table{
background:white;
color:black;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid black;
padding:6px 10px;
}

.playerRow{
background:#ddd;
font-weight:bold;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music/stadium.mp3">
</audio>

<div id="intro" class="screen active">
<img id="trophy" src="img/trofeu.png">
</div>

<div id="menu" class="screen">

<h1>Memory of the Champions</h1>

<div class="menuButtons">
<button onclick="start()">Jogar</button>
<button class="circleBtn" onclick="trocarTela('rules')">?</button>
</div>

<h2>Ranking</h2>

<table id="rankTable">
<tr>
<th>Jogador</th>
<th>Dificuldade</th>
<th>Pontos</th>
<th>Tempo</th>
<th>Data</th>
</tr>
</table>

</div>

<div id="rules" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<div class="rulesBox">

<h2>Regras</h2>

<p>Encontre os pares de jogadores.</p>
<p>Cada par vale <b>10 pontos</b>.</p>
<p>O tempo depende da dificuldade.</p>
<p>Mesmo se o tempo acabar sua pontuação será salva.</p>

</div>

</div>

<div id="difficulty" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<h2>Dificuldade</h2>

<button onclick="startGame(120,'Fácil')">Fácil</button>
<button onclick="startGame(90,'Médio')">Médio</button>
<button onclick="startGame(60,'Normal')">Normal</button>
<button onclick="startGame(40,'Difícil')">Difícil</button>
<button onclick="startGame(20,'Extremo')">Extremo</button>

</div>

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="points">Pontos: 0</div>
<div id="timer">Tempo: 0</div>

<div id="board"></div>

</div>

<script>

setTimeout(()=>trocarTela("menu"),3500)

let nome=""
let pontos=0
let dificuldadeAtual=""
let tempoFinal=0
let tempoInicial=0
let timerInterval
let jogoAtivo=false

const jogadores=[
"messi","mbappe","neymar","modric","griezmann",
"alvarez","vinijr","kane","debruyne","hakimi","giroud"
]

let cartas=[]
let primeira=null
let segunda=null
let trava=false

function trocarTela(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function start(){

nome=prompt("Digite seu nome")
if(!nome)return

document.getElementById("player").innerText="Jogador: "+nome

trocarTela("difficulty")

}

function startGame(segundos,dif){

pontos=0
dificuldadeAtual=dif
jogoAtivo=true

document.getElementById("points").innerText="Pontos: 0"

tempoInicial=Date.now()
tempoFinal=Date.now()+segundos*1000

trocarTela("game")

document.getElementById("music").play()

criarTabuleiro()

timerInterval=setInterval(atualizarTempo,500)

}

function atualizarTempo(){

if(!jogoAtivo)return

let restante=Math.floor((tempoFinal-Date.now())/1000)

if(restante<0) restante=0

document.getElementById("timer").innerText="Tempo: "+restante

if(restante<=0){

clearInterval(timerInterval)
timerInterval=null

encerrar(false)

return
}

}

function criarTabuleiro(){

cartas=[...jogadores,...jogadores]
cartas.sort(()=>Math.random()-0.5)

const board=document.getElementById("board")
board.innerHTML=""

cartas.forEach(j=>{

let card=document.createElement("div")
card.className="card"
card.dataset.valor=j

let img=document.createElement("img")
img.src="img/"+j+".jpg"

card.appendChild(img)

card.onclick=()=>virar(card)

board.appendChild(card)

})

}

function virar(card){

if(!jogoAtivo)return
if(trava)return
if(card.classList.contains("open"))return

card.classList.add("open")

if(!primeira){
primeira=card
return
}

segunda=card
trava=true

if(primeira.dataset.valor===segunda.dataset.valor){

pontos+=10
document.getElementById("points").innerText="Pontos: "+pontos

primeira=null
segunda=null
trava=false

verificar()

}else{

setTimeout(()=>{

primeira.classList.remove("open")
segunda.classList.remove("open")

primeira=null
segunda=null
trava=false

},800)

}

}

function verificar(){

let abertas=document.querySelectorAll(".card.open")

if(abertas.length===cartas.length){

encerrar(true)

}

}

function encerrar(vitoria){

jogoAtivo=false

if(timerInterval){
clearInterval(timerInterval)
timerInterval=null
}

const music=document.getElementById("music")
music.pause()
music.currentTime=0

document.querySelectorAll(".card").forEach(c=>{
c.classList.add("disabled")
c.onclick=null
})

let tempoUsado=Math.floor((Date.now()-tempoInicial)/1000)

salvarRank(nome,pontos,tempoUsado)

setTimeout(()=>{

if(vitoria){
alert("Você venceu! Pontos: "+pontos)
}else{
alert("Game Over! Pontos: "+pontos)
}

trocarTela("menu")

},200)

}

function salvarRank(nome,pontos,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let jogador=rank.find(j=>j.nome===nome)

if(!jogador){

jogador={nome:nome,jogos:[]}
rank.push(jogador)

}

jogador.jogos.push({
dificuldade:dificuldadeAtual,
pontos:pontos,
tempo:tempo,
data:new Date().toLocaleDateString()
})

localStorage.setItem("rank",JSON.stringify(rank))

}

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

rank.forEach(j=>{

let linha=document.createElement("tr")
linha.className="playerRow"
linha.innerHTML=`<td colspan="5">${j.nome}</td>`
tabela.appendChild(linha)

j.jogos.forEach(g=>{

let l=document.createElement("tr")

l.innerHTML=`
<td></td>
<td>${g.dificuldade}</td>
<td>${g.pontos}</td>
<td>${g.tempo}s</td>
<td>${g.data}</td>
`

tabela.appendChild(l)

})

})

}

carregarRank()

</script>

</body>
</html>
