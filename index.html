<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:black;
}

/* telas */

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* intro */

#intro{
background:url("img/tela_roxa.jpg") center/cover no-repeat;
}

#trophy{
width:200px;
animation:spin 3s linear;
}

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* menu */

#menu{
background:url("img/fundo_menu.jpg") center/cover no-repeat;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
background:#1e90ff;
color:white;
}

.circleBtn{
width:50px;
height:50px;
border-radius:50%;
}

.menuButtons{
display:flex;
gap:10px;
}

/* regras */

#rules{
background:#9be79b;
color:black;
}

.rulesBox{
background:#0a5f0a;
color:white;
padding:25px;
border-radius:10px;
max-width:600px;
}

.back{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

/* jogo */

#game{
position:relative;
background:#0b1020;
}

#hud{
position:absolute;
top:10px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:0 20px;
font-weight:bold;
}

#board{
margin-top:80px;
display:grid;
grid-template-columns:repeat(6,140px);
gap:10px;
justify-content:center;
}

.card{
width:140px;
height:170px;
background:#1e90ff;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.card img{
width:100%;
height:100%;
border-radius:10px;
display:none;
}

.card.open img{
display:block;
}

/* ranking */

table{
background:white;
color:black;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid black;
padding:6px 10px;
}

.playerRow{
background:#ddd;
font-weight:bold;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music/stadium.mp3">
</audio>

<!-- INTRO -->

<div id="intro" class="screen active">
<img id="trophy" src="img/trofeu.png">
</div>

<!-- MENU -->

<div id="menu" class="screen">

<h1>Memory of the Champions</h1>

<div class="menuButtons">
<button onclick="start()">Jogar</button>
<button class="circleBtn" onclick="trocarTela('rules')">?</button>
</div>

<h2>Ranking</h2>

<table id="rankTable">
<tr>
<th>Jogador</th>
<th>Dificuldade</th>
<th>Pontos</th>
<th>Tempo</th>
<th>Data</th>
</tr>
</table>

</div>

<!-- REGRAS -->

<div id="rules" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<div class="rulesBox">

<h2>Regras</h2>

<p>Encontre os pares de jogadores.</p>
<p>Cada par vale <b>10 pontos</b>.</p>
<p>O tempo depende da dificuldade.</p>
<p>Se o tempo acabar aparece <b>Game Over</b>.</p>

</div>

</div>

<!-- DIFICULDADE -->

<div id="difficulty" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<h2>Dificuldade</h2>

<button onclick="startGame(120,'Fácil')">Fácil</button>
<button onclick="startGame(90,'Médio')">Médio</button>
<button onclick="startGame(60,'Normal')">Normal</button>
<button onclick="startGame(40,'Difícil')">Difícil</button>
<button onclick="startGame(20,'Extremo')">Extremo</button>

</div>

<!-- GAME -->

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="hud">
<div id="points">Pontos: 0</div>
<div id="timer">Tempo: 0</div>
</div>

<div id="board"></div>

</div>

<script>

/* intro */

setTimeout(()=>trocarTela("menu"),3000)

/* variáveis */

let nome=""
let pontos=0
let dificuldadeAtual=""

let tempoRestante=0
let timerInterval=null

let jogoAtivo=false

const jogadores=[
"messi","mbappe","neymar","modric","griezmann",
"alvarez","vinijr","kane","debruyne","hakimi","giroud"
]

let cartas=[]
let primeira=null
let segunda=null
let trava=false

/* trocar tela */

function trocarTela(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* iniciar */

function start(){

nome=prompt("Digite seu nome")

if(!nome) return

document.getElementById("player").innerText="Jogador: "+nome

trocarTela("difficulty")

}

/* iniciar jogo */

function startGame(segundos,dif){

pontos=0
dificuldadeAtual=dif

tempoRestante=segundos

jogoAtivo=true

primeira=null
segunda=null
trava=false

document.getElementById("points").innerText="Pontos: 0"
document.getElementById("timer").innerText="Tempo: "+tempoRestante

trocarTela("game")

document.getElementById("music").play()

criarTabuleiro()

if(timerInterval) clearInterval(timerInterval)

timerInterval=setInterval(timerTick,1000)

}

/* timer */

function timerTick(){

if(!jogoAtivo) return

tempoRestante--

document.getElementById("timer").innerText="Tempo: "+tempoRestante

if(tempoRestante<=0){

clearInterval(timerInterval)

encerrar(false)

}

}

/* criar cartas */

function criarTabuleiro(){

cartas=[...jogadores,...jogadores]

cartas.sort(()=>Math.random()-0.5)

const board=document.getElementById("board")

board.innerHTML=""

cartas.forEach(j=>{

let card=document.createElement("div")
card.className="card"
card.dataset.valor=j

let img=document.createElement("img")
img.src="img/"+j+".jpg"

card.appendChild(img)

card.onclick=()=>virar(card)

board.appendChild(card)

})

}

/* virar carta */

function virar(card){

if(!jogoAtivo) return
if(trava) return
if(card.classList.contains("open")) return

card.classList.add("open")

if(!primeira){
primeira=card
return
}

segunda=card
trava=true

if(primeira.dataset.valor===segunda.dataset.valor){

pontos+=10

document.getElementById("points").innerText="Pontos: "+pontos

primeira=null
segunda=null
trava=false

verificar()

}else{

setTimeout(()=>{

primeira.classList.remove("open")
segunda.classList.remove("open")

primeira=null
segunda=null
trava=false

},800)

}

}

/* vitória */

function verificar(){

let abertas=document.querySelectorAll(".card.open")

if(abertas.length===cartas.length){

encerrar(true)

}

}

/* encerrar */

function encerrar(vitoria){

if(!jogoAtivo) return

jogoAtivo=false

clearInterval(timerInterval)

const music=document.getElementById("music")
music.pause()
music.currentTime=0

let tempoUsado=tempoRestante

salvarRank(nome,pontos,tempoUsado)

setTimeout(()=>{

if(vitoria){
alert("Você venceu! Pontos: "+pontos)
}else{
alert("Game Over! Pontos: "+pontos)
}

trocarTela("menu")

},200)

}

/* salvar rank */

function salvarRank(nome,pontos,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let jogador=rank.find(j=>j.nome===nome)

if(!jogador){

jogador={nome:nome,jogos:[]}
rank.push(jogador)

}

let jogoExistente=jogador.jogos.find(g=>g.dificuldade===dificuldadeAtual)

if(!jogoExistente){

jogador.jogos.push({
dificuldade:dificuldadeAtual,
pontos:pontos,
tempo:tempo,
data:new Date().toLocaleDateString()
})

}else{

if(pontos>jogoExistente.pontos){

jogoExistente.pontos=pontos
jogoExistente.tempo=tempo
jogoExistente.data=new Date().toLocaleDateString()

}

}

localStorage.setItem("rank",JSON.stringify(rank))

carregarRank()

}

/* carregar ranking */

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

tabela.innerHTML=`<tr>
<th>Jogador</th>
<th>Dificuldade</th>
<th>Pontos</th>
<th>Tempo</th>
<th>Data</th>
</tr>`

rank.forEach(j=>{

let linha=document.createElement("tr")
linha.className="playerRow"
linha.innerHTML=`<td colspan="5">${j.nome}</td>`
tabela.appendChild(linha)

j.jogos.forEach(g=>{

let l=document.createElement("tr")

l.innerHTML=`
<td></td>
<td>${g.dificuldade}</td>
<td>${g.pontos}</td>
<td>${g.tempo}s</td>
<td>${g.data}</td>
`

tabela.appendChild(l)

})

})

}

carregarRank()

</script>

</body>
</html>
