<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:black;
}

/* telas */

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* INTRO */

#intro{
background:url("img/tela_roxa.jpg") center/cover no-repeat;
}

#trophy{
width:200px;
animation:giro 3s linear;
}

@keyframes giro{
0%{transform:rotateY(0)}
100%{transform:rotateY(360deg)}
}

/* MENU */

#menu{
background:url("img/fundo_menu.jpg") center/cover no-repeat;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
background:#1e90ff;
color:white;
}

/* GAME */

#game{
background:#0b1020;
}

#hud{
display:flex;
justify-content:space-between;
width:650px;
margin-bottom:20px;
font-weight:bold;
}

#board{
display:grid;
grid-template-columns:repeat(6,120px);
gap:10px;
}

.card{
width:120px;
height:150px;
background:#1e90ff;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.card.open{
background:white;
color:black;
}

/* GAME OVER */

#gameover{
background:#111;
}

/* ranking */

table{
background:white;
color:black;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid black;
padding:6px 10px;
}

.playerRow{
background:#ddd;
font-weight:bold;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro" class="screen active">

<img id="trophy" src="img/trofeu.png">

<h1>Memory of the Champions</h1>

</div>

<!-- MENU -->

<div id="menu" class="screen">

<h2>Menu</h2>

<button onclick="start()">Jogar</button>

<h3>Ranking</h3>

<table id="rankTable">

<tr>
<th>Jogador</th>
<th>Pontos</th>
<th>Tempo</th>
</tr>

</table>

</div>

<!-- GAME -->

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="hud">
<div id="points">Pontos:0</div>
<div id="timer">Tempo:0</div>
</div>

<div id="board"></div>

</div>

<!-- GAME OVER -->

<div id="gameover" class="screen">

<h1 id="resultText"></h1>

<button onclick="trocarTela('menu')">Voltar ao Menu</button>

</div>

<script>

/* intro */

setTimeout(()=>trocarTela("menu"),3000)

/* variáveis */

let nome=""
let pontos=0
let tempoRestante=60

let timerInterval=null

let jogoAtivo=false

let primeira=null
let segunda=null
let trava=false

const simbolos=[
"⚽","🥅","🏆","🥇","🎯","👟","🧤","📣","🏟️","🎽","🟡"
]

let cartas=[]

/* trocar tela */

function trocarTela(id){

document.querySelectorAll(".screen").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* iniciar */

function start(){

nome=prompt("Digite seu nome")

if(!nome)return

document.getElementById("player").innerText="Jogador: "+nome

startGame()

}

/* iniciar jogo */

function startGame(){

pontos=0
tempoRestante=60

jogoAtivo=true

document.getElementById("points").innerText="Pontos:0"
document.getElementById("timer").innerText="Tempo:"+tempoRestante

trocarTela("game")

criarTabuleiro()

if(timerInterval) clearInterval(timerInterval)

timerInterval=setInterval(timerTick,1000)

}

/* timer */

function timerTick(){

if(!jogoAtivo) return

tempoRestante--

document.getElementById("timer").innerText="Tempo:"+tempoRestante

if(tempoRestante<=0){

encerrar(false)

}

}

/* criar cartas */

function criarTabuleiro(){

cartas=[...simbolos,...simbolos]

cartas.sort(()=>Math.random()-0.5)

const board=document.getElementById("board")

board.innerHTML=""

cartas.forEach(simbolo=>{

let card=document.createElement("div")

card.className="card"

card.dataset.valor=simbolo

card.innerText="?"

card.onclick=()=>virar(card)

board.appendChild(card)

})

}

/* virar carta */

function virar(card){

if(!jogoAtivo)return
if(trava)return
if(card.classList.contains("open"))return

card.classList.add("open")

card.innerText=card.dataset.valor

if(!primeira){

primeira=card
return

}

segunda=card

trava=true

if(primeira.dataset.valor===segunda.dataset.valor){

pontos+=10

document.getElementById("points").innerText="Pontos:"+pontos

primeira=null
segunda=null
trava=false

verificar()

}else{

setTimeout(()=>{

primeira.classList.remove("open")
segunda.classList.remove("open")

primeira.innerText="?"
segunda.innerText="?"

primeira=null
segunda=null
trava=false

},800)

}

}

/* vitória */

function verificar(){

let abertas=document.querySelectorAll(".card.open")

if(abertas.length===cartas.length){

encerrar(true)

}

}

/* encerrar */

function encerrar(vitoria){

if(!jogoAtivo)return

jogoAtivo=false

clearInterval(timerInterval)

if(vitoria){

document.getElementById("resultText").innerText="VOCÊ VENCEU! Pontos:"+pontos

}else{

document.getElementById("resultText").innerText="GAME OVER! Pontos:"+pontos

}

salvarRank(nome,pontos,tempoRestante)

trocarTela("gameover")

}

/* ranking */

function salvarRank(nome,pontos,tempo){

if(!nome)return

let rank=JSON.parse(localStorage.getItem("rank"))||[]

rank.push({
nome:nome,
pontos:pontos,
tempo:tempo
})

localStorage.setItem("rank",JSON.stringify(rank))

carregarRank()

}

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

tabela.innerHTML="<tr><th>Jogador</th><th>Pontos</th><th>Tempo</th></tr>"

rank.forEach(j=>{

if(!j.nome)return

let l=document.createElement("tr")

l.innerHTML=`<td>${j.nome}</td><td>${j.pontos}</td><td>${j.tempo}</td>`

tabela.appendChild(l)

})

}

carregarRank()

</script>

</body>
</html>
