<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória - Copa do Mundo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3c5d;
color:white;
text-align:center;
}

#menu,#difficulty,#game{
display:none;
}

.active{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#playBtn{
background:#1e90ff;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(11,70px);
gap:8px;
justify-content:center;
margin-top:20px;
}

.card{
width:70px;
height:90px;
background:#1e90ff;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
display:none;
border-radius:8px;
}

.card.open img{
display:block;
}

#timer{
font-size:26px;
margin-top:10px;
}

#countdown{
position:absolute;
font-size:90px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="active">

<h1>JOGO DA MEMÓRIA</h1>
<h3>Especial Copa do Mundo</h3>

<button id="playBtn">👤 Jogar</button>

</div>

<!-- ESCOLHA DIFICULDADE -->
<div id="difficulty">

<h2>Escolha a dificuldade</h2>

<button onclick="startCountdown(120)">Fácil (2 min)</button>
<button onclick="startCountdown(90)">Médio (1:30)</button>
<button onclick="startCountdown(60)">Normal (1 min)</button>
<button onclick="startCountdown(40)">Difícil (40s)</button>
<button onclick="startCountdown(20)">Extremo (20s)</button>

</div>

<!-- JOGO -->
<div id="game">

<h2 id="playerName"></h2>

<div id="timer"></div>

<div id="board"></div>

</div>

<div id="countdown"></div>

<script>

let playerName="";

const players=[
"messi",
"mbappe",
"neymar",
"modric",
"griezmann",
"alvarez",
"vinijr",
"kane",
"debruyne",
"hakimi",
"giroud"
];

let deck=[];
let first=null;
let second=null;
let lock=false;

let tempoRestante;
let timerInterval;

document.getElementById("playBtn").onclick=()=>{

playerName=prompt("Digite seu nome");

if(!playerName)return;

document.getElementById("playerName").innerText="Jogador: "+playerName;

showScreen("difficulty");

};

function showScreen(id){

document.querySelectorAll("#menu,#difficulty,#game")
.forEach(e=>e.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function startCountdown(tempo){

showScreen("game");

let count=3;

let el=document.getElementById("countdown");

el.style.display="block";

el.innerText=count;

let interval=setInterval(()=>{

count--;

if(count==0){

clearInterval(interval);

el.style.display="none";

startGame(tempo);

}else{

el.innerText=count;

}

},1000);

}

function startGame(tempo){

tempoRestante=tempo;

deck=[...players,...players];

deck.sort(()=>Math.random()-0.5);

const board=document.getElementById("board");

board.innerHTML="";

deck.forEach(player=>{

let card=document.createElement("div");

card.className="card";

card.dataset.value=player;

let img=document.createElement("img");

img.src="img/"+player+".jpg";

card.appendChild(img);

card.onclick=()=>flip(card);

board.appendChild(card);

});

timerInterval=setInterval(()=>{

tempoRestante--;

document.getElementById("timer").innerText="Tempo: "+tempoRestante+"s";

if(tempoRestante<=0){

clearInterval(timerInterval);

alert("Game Over");

location.reload();

}

},1000);

}

function flip(card){

if(lock)return;

if(card.classList.contains("open"))return;

card.classList.add("open");

if(!first){

first=card;

return;

}

second=card;

lock=true;

if(first.dataset.value==second.dataset.value){

first=null;

second=null;

lock=false;

checkWin();

}else{

setTimeout(()=>{

first.classList.remove("open");

second.classList.remove("open");

first=null;

second=null;

lock=false;

},800);

}

}

function checkWin(){

let abertas=document.querySelectorAll(".open");

if(abertas.length===deck.length){

clearInterval(timerInterval);

alert("Você venceu!");

location.reload();

}

}

</script>

</body>
</html>
