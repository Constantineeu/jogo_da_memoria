<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>

<style>

body{
margin:0;
font-family:Arial;
background-size:cover;
background-position:center;
color:white;
text-align:center;
}

/* telas */

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* tela de abertura */

#intro{
background-image:url("img/tela_roxa.jpg");
position:relative;
}

#trophy{
width:180px;
opacity:0;
animation:spin 2s linear forwards;
}

@keyframes spin{

0%{
transform:rotateY(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:rotateY(360deg);
opacity:1;
}

}

/* menu */

#menu{
background-image:url("img/fundo_menu.jpg");
background-size:cover;
}

.menuButtons{
display:flex;
gap:15px;
margin:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.circleBtn{
width:50px;
height:50px;
border-radius:50%;
font-size:22px;
padding:0;
}

/* cartas */

#board{
display:grid;
grid-template-columns:repeat(4,120px);
gap:12px;
justify-content:center;
margin-top:20px;
}

.card{
width:120px;
height:150px;
background:#1e90ff;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.card img{
width:100%;
height:100%;
display:none;
border-radius:10px;
}

.card.open img{
display:block;
}

#timer{
font-size:28px;
margin:10px;
}

table{
background:white;
color:black;
border-collapse:collapse;
}

td,th{
padding:6px 12px;
border:1px solid black;
}

.back{
position:absolute;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
}

.rulesBox{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
max-width:600px;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music/stadium.mp3">
</audio>

<!-- INTRO -->

<div id="intro" class="screen active">

<img id="trophy" src="img/trofeu.png">

</div>

<!-- MENU -->

<div id="menu" class="screen">

<h1>Memory of the Champions</h1>

<div class="menuButtons">

<button onclick="start()">👤 Jogar</button>

<button class="circleBtn" onclick="showRules()">❓</button>

</div>

<h2>Ranking</h2>

<table id="rankTable">

<tr>
<th>#</th>
<th>Nome</th>
<th>Tempo</th>
<th>Data</th>
</tr>

</table>

</div>

<!-- REGRAS -->

<div id="rules" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<div class="rulesBox">

<h2>Regras</h2>

<p>Encontre todos os pares antes do tempo acabar.</p>
<p>Cada dificuldade tem um tempo diferente.</p>

</div>

</div>

<!-- DIFICULDADE -->

<div id="difficulty" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<h2>Escolha a dificuldade</h2>

<button onclick="countdown(120)">Fácil</button>
<button onclick="countdown(90)">Médio</button>
<button onclick="countdown(60)">Normal</button>
<button onclick="countdown(40)">Difícil</button>
<button onclick="countdown(20)">Extremo</button>

</div>

<!-- JOGO -->

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="timer"></div>

<div id="board"></div>

</div>

<script>

/* intro */

setTimeout(()=>{

trocarTela("menu")

},3500)

let nome=""
let tempoInicial
let tempo
let intervalo

const jogadores=[
"messi","mbappe","neymar","modric","griezmann",
"alvarez","vinijr","kane","debruyne","hakimi","giroud"
]

let cartas=[]
let primeira=null
let segunda=null
let trava=false

function trocarTela(id){

document.querySelectorAll(".screen")
.forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function showRules(){
trocarTela("rules")
}

function start(){

nome=prompt("Digite seu nome")

if(!nome)return

document.getElementById("player").innerText="Jogador: "+nome

trocarTela("difficulty")

}

function countdown(t){

tempoInicial=t
tempo=t

trocarTela("game")

document.getElementById("music").play()

iniciarJogo()

}

function iniciarJogo(){

cartas=[...jogadores,...jogadores]

cartas.sort(()=>Math.random()-0.5)

const tab=document.getElementById("board")

tab.innerHTML=""

cartas.forEach(j=>{

let card=document.createElement("div")
card.className="card"
card.dataset.valor=j

let img=document.createElement("img")
img.src="img/"+j+".jpg"

card.appendChild(img)

card.onclick=()=>virar(card)

tab.appendChild(card)

})

intervalo=setInterval(()=>{

tempo--

document.getElementById("timer").innerText="Tempo: "+tempo+"s"

if(tempo<=0){

clearInterval(intervalo)
music.pause()

alert("Game Over")

location.reload()

}

},1000)

}

function virar(card){

if(trava)return
if(card.classList.contains("open"))return

card.classList.add("open")

if(!primeira){

primeira=card
return

}

segunda=card
trava=true

if(primeira.dataset.valor==segunda.dataset.valor){

primeira=null
segunda=null
trava=false

verificar()

}else{

setTimeout(()=>{

primeira.classList.remove("open")
segunda.classList.remove("open")

primeira=null
segunda=null
trava=false

},800)

}

}

function verificar(){

let abertas=document.querySelectorAll(".open")

if(abertas.length==cartas.length){

clearInterval(intervalo)

music.pause()

let tempoUsado=tempoInicial-tempo

salvarRank(nome,tempoUsado)

alert("Você venceu em "+tempoUsado+" segundos!")

location.reload()

}

}

function salvarRank(nome,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let jogador=rank.find(r=>r.nome===nome)

let data=new Date().toLocaleDateString()

if(jogador){

if(tempo<jogador.tempo){
jogador.tempo=tempo
jogador.data=data
}

}else{

rank.push({nome,tempo,data})

}

rank.sort((a,b)=>a.tempo-b.tempo)

rank=rank.slice(0,50)

localStorage.setItem("rank",JSON.stringify(rank))

}

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

rank.forEach((r,i)=>{

let linha=document.createElement("tr")

linha.innerHTML=`
<td>${i+1}</td>
<td>${r.nome}</td>
<td>${r.tempo}s</td>
<td>${r.data}</td>
`

tabela.appendChild(linha)

})

}

carregarRank()

</script>

</body>
</html>
