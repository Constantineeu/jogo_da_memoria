<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Memory of the Champions</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background-size:cover;
background-position:center;
}

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* INTRO */

#intro{
background-image:url("img/tela_roxa.jpg");
}

#trophy{
width:180px;
opacity:0;
animation:spin 2s linear forwards;
}

@keyframes spin{
0%{transform:rotateY(0deg);opacity:0;}
20%{opacity:1;}
100%{transform:rotateY(360deg);opacity:1;}
}

/* MENU */

#menu{
background-image:url("img/fundo_menu.jpg");
}

.menuButtons{
display:flex;
gap:15px;
margin:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.circleBtn{
width:50px;
height:50px;
border-radius:50%;
font-size:22px;
}

/* HUD */

#game{
position:relative;
}

#timer{
position:absolute;
top:15px;
right:20px;
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:8px;
}

#points{
position:absolute;
top:15px;
left:20px;
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:8px;
}

/* TABULEIRO */

#board{
display:grid;
grid-template-columns:repeat(4,120px);
gap:12px;
justify-content:center;
margin-top:60px;
}

.card{
width:120px;
height:150px;
background:#1e90ff;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.card img{
width:100%;
height:100%;
display:none;
border-radius:10px;
}

.card.open img{
display:block;
}

/* RANK */

table{
background:white;
color:black;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:6px 12px;
border:1px solid black;
}

.playerRow{
background:#ddd;
font-weight:bold;
}

/* REGRAS */

.back{
position:absolute;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
}

.rulesBox{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
max-width:600px;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music/stadium.mp3">
</audio>

<!-- INTRO -->

<div id="intro" class="screen active">
<img id="trophy" src="img/trofeu.png">
</div>

<!-- MENU -->

<div id="menu" class="screen">

<h1>Memory of the Champions</h1>

<div class="menuButtons">
<button onclick="start()">Jogar</button>
<button class="circleBtn" onclick="trocarTela('rules')">?</button>
</div>

<h2>Ranking</h2>

<table id="rankTable">
<tr>
<th>Jogador</th>
<th>Dificuldade</th>
<th>Pontos</th>
<th>Tempo</th>
<th>Data</th>
</tr>
</table>

</div>

<!-- REGRAS -->

<div id="rules" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<div class="rulesBox">

<h2>Regras</h2>

<p>Encontre os pares de jogadores da Copa.</p>

<p>Cada par vale <b>10 pontos</b>.</p>

<p>Se o tempo acabar sua pontuação será salva.</p>

<p>O ranking guarda sua pontuação por dificuldade.</p>

</div>

</div>

<!-- DIFICULDADE -->

<div id="difficulty" class="screen">

<div class="back" onclick="trocarTela('menu')">⬅</div>

<h2>Escolha a dificuldade</h2>

<button onclick="startGame(120,'Fácil')">Fácil</button>
<button onclick="startGame(90,'Médio')">Médio</button>
<button onclick="startGame(60,'Normal')">Normal</button>
<button onclick="startGame(40,'Difícil')">Difícil</button>
<button onclick="startGame(20,'Extremo')">Extremo</button>

</div>

<!-- JOGO -->

<div id="game" class="screen">

<h2 id="player"></h2>

<div id="points">Pontos: 0</div>
<div id="timer">Tempo: 0</div>

<div id="board"></div>

</div>

<script>

setTimeout(()=>{trocarTela("menu")},3500)

let nome=""
let tempoInicial
let tempo
let intervalo
let pontos=0
let dificuldadeAtual=""
let jogoAtivo=true

const jogadores=[
"messi","mbappe","neymar","modric","griezmann",
"alvarez","vinijr","kane","debruyne","hakimi","giroud"
]

let cartas=[]
let primeira=null
let segunda=null
let trava=false

function trocarTela(id){

document.querySelectorAll(".screen")
.forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function start(){

nome=prompt("Digite seu nome")

if(!nome)return

document.getElementById("player").innerText="Jogador: "+nome

trocarTela("difficulty")

}

function startGame(t,dif){

tempoInicial=t
tempo=t
pontos=0
dificuldadeAtual=dif
jogoAtivo=true

document.getElementById("points").innerText="Pontos: 0"

trocarTela("game")

document.getElementById("music").play()

iniciarJogo()

}

function iniciarJogo(){

cartas=[...jogadores,...jogadores]
cartas.sort(()=>Math.random()-0.5)

const tab=document.getElementById("board")
tab.innerHTML=""

cartas.forEach(j=>{

let card=document.createElement("div")
card.className="card"
card.dataset.valor=j

let img=document.createElement("img")
img.src="img/"+j+".jpg"

card.appendChild(img)

card.onclick=()=>virar(card)

tab.appendChild(card)

})

intervalo=setInterval(()=>{

tempo--

document.getElementById("timer").innerText="Tempo: "+tempo+"s"

if(tempo<=0){

clearInterval(intervalo)
jogoAtivo=false

salvarRank(nome,pontos,tempoInicial)

alert("Tempo acabou! Pontos: "+pontos)

location.reload()

}

},1000)

}

function virar(card){

if(!jogoAtivo) return
if(trava)return
if(card.classList.contains("open"))return

card.classList.add("open")

if(!primeira){
primeira=card
return
}

segunda=card
trava=true

if(primeira.dataset.valor==segunda.dataset.valor){

pontos+=10
document.getElementById("points").innerText="Pontos: "+pontos

primeira=null
segunda=null
trava=false

verificar()

}else{

setTimeout(()=>{

primeira.classList.remove("open")
segunda.classList.remove("open")

primeira=null
segunda=null
trava=false

},800)

}

}

function verificar(){

let abertas=document.querySelectorAll(".open")

if(abertas.length==cartas.length){

clearInterval(intervalo)
jogoAtivo=false

salvarRank(nome,pontos,tempoInicial-tempo)

alert("Você venceu! Pontos: "+pontos)

location.reload()

}

}

function salvarRank(nome,pontos,tempo){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let jogador=rank.find(j=>j.nome===nome)

if(!jogador){

jogador={nome:nome,jogos:[]}
rank.push(jogador)

}

let jogo=jogador.jogos.find(j=>j.dificuldade===dificuldadeAtual)

let data=new Date().toLocaleDateString()

if(jogo){

if(pontos>jogo.pontos){
jogo.pontos=pontos
jogo.tempo=tempo
jogo.data=data
}

}else{

jogador.jogos.push({
dificuldade:dificuldadeAtual,
pontos:pontos,
tempo:tempo,
data:data
})

}

localStorage.setItem("rank",JSON.stringify(rank))

}

function carregarRank(){

let rank=JSON.parse(localStorage.getItem("rank"))||[]

let tabela=document.getElementById("rankTable")

rank.forEach(jogador=>{

let linhaNome=document.createElement("tr")
linhaNome.className="playerRow"

linhaNome.innerHTML=`<td colspan="5">${jogador.nome}</td>`
tabela.appendChild(linhaNome)

jogador.jogos.forEach(j=>{

let linha=document.createElement("tr")

linha.innerHTML=`
<td></td>
<td>${j.dificuldade}</td>
<td>${j.pontos}</td>
<td>${j.tempo}s</td>
<td>${j.data}</td>
`

tabela.appendChild(linha)

})

})

}

carregarRank()

</script>

</body>
</html>
